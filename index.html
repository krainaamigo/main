<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraina Rozrywki Amigo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="navigateTo('home')">Kraina Rozrywki Amigo</div>
        <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <nav id="mobile-nav">
            <ul class="nav-links">
                <li><a id="nav-home" onclick="navigateTo('home')" data-i18n="nav_home"></a></li>
                <li><a id="nav-attractions" onclick="navigateTo('attractions')" data-i18n="nav_attractions"></a></li>
                <li><a id="nav-gallery" onclick="navigateTo('gallery')" data-i18n="nav_gallery"></a></li>
                <li><a id="nav-prices" onclick="navigateTo('prices')" data-i18n="nav_prices"></a></li>
                <li><a id="nav-contact" onclick="navigateTo('contact')" data-i18n="nav_contact"></a></li>
            </ul>
        </nav>
        <div class="header-right">
            <div class="weather-widget">
                <i id="weather-icon" class="fas fa-spinner fa-spin"></i>
                <span id="weather-text">Loading...</span>
            </div>
            <div class="lang-switch">
                <button id="btn-pl" class="lang-btn" onclick="changeLanguage('pl')">PL</button>
                <button id="btn-en" class="lang-btn" onclick="changeLanguage('en')">EN</button>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <main class="content-area">
            <section id="page-home" class="page-section">
                <h2 data-i18n="home_title"></h2>
                <p data-i18n="home_desc"></p>
                
                <div class="photo-management-zone">
                    <img src="" 
                        alt="Main photo" 
                        class="managed-photo" 
                        data-db-table="page_photos" 
                        data-db-id="1" 
                        style="display: none;">
                    
                    <div class="admin-photo-buttons" style="display: none;">
                        <button onclick="uploadManagedPhoto(this)" class="admin-photo-btn upload-btn"><i class="fas fa-camera"></i> Dodaj/Zmień</button>
                        <button onclick="deleteManagedPhoto(this)" class="admin-photo-btn delete-btn"><i class="fas fa-trash"></i> Usuń</button>
                    </div>
                </div>
            </section>

            <section id="page-attractions" class="page-section">
                <h2 data-i18n="attractions_title"></h2>
                <p data-i18n="attractions_desc"></p>
                <div class="grid-attractions">
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/bajonki.jpeg" alt="Bajonki">
                            <div class="ticket-stub">
                                <span data-i18n="img_1"></span>
                            </div>
                        </div>
                    </div>

                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/hipopotamy.jpeg" alt="Hipopotamy">
                            <div class="ticket-stub">
                                <span data-i18n="img_2"></span>
                            </div>
                        </div>
                    </div>

                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/safari.jpeg" alt="Safari">
                            <div class="ticket-stub">
                                <span data-i18n="img_3"></span>
                            </div>
                        </div>
                    </div>

                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/lodeczki.jpeg" alt="Łódeczki wodne">
                            <div class="ticket-stub">
                                <span data-i18n="img_4"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/walec.jpeg" alt="Walec wodny">
                            <div class="ticket-stub">
                                <span data-i18n="img_5"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/eliminator.jpeg" alt="Eliminator">
                            <div class="ticket-stub">
                                <span data-i18n="img_6"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/eurobungee.jpeg" alt="Eurobungee">
                            <div class="ticket-stub">
                                <span data-i18n="img_7"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/kolejka.jpeg" alt="Kolejka">
                            <div class="ticket-stub">
                                <span data-i18n="img_8"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/kosz.jpeg" alt="Koszykówka">
                            <div class="ticket-stub">
                                <span data-i18n="img_9"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/namiot.jpeg" alt="Namiot">
                            <div class="ticket-stub">
                                <span data-i18n="img_10"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ticket-wrapper">
                        <div class="ticket-body">
                            <img class="attractions-img" src="images/attractions/nagrody.jpeg" alt="Nagrody">
                            <div class="ticket-stub">
                                <span data-i18n="img_11"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="page-gallery" class="page-section">
                <h2 data-i18n="gallery_title"></h2>
                <p data-i18n="gallery_desc"></p>
                
                <div id="albums-container" class="albums-grid"></div>
            </section>

            <div id="album-preview-modal" class="custom-modal" style="display: none;">
                <div class="modal-content album-preview-content">
                    <span class="close-modal" onclick="closeAlbumModal()">&times;</span>
                    <h3 id="modal-album-title">Nazwa Albumu</h3>
                    
                    <div id="admin-add-photo-zone" style="display:none; margin-bottom:20px;">
                        <input type="file" id="album-photo-input" accept="image/*" multiple style="display:none;" onchange="uploadPhotosToAlbum()">
                        <button onclick="document.getElementById('album-photo-input').click()" class="admin-btn save-btn"><i class="fas fa-plus"></i> Dodaj zdjęcia do albumu</button>
                    </div>

                    <div id="album-photos-grid" class="photos-grid"></div>
                </div>
            </div>


            <section id="page-prices" class="page-section">
                <h2 data-i18n="prices_title"></h2>
                
                <div id="admin-pricing-control"></div>

                <div id="pricing-container" class="pricing-list"></div>
            </section>

            <section id="page-contact" class="page-section">
                <h2 data-i18n="contact_title"></h2>
                
                <div class="contact-container">
                    <div class="contact-info">
                        <div class="info-item">
                            <a href="tel:+48790709410" class="btn btn-tel">
                                <i class="fas fa-phone"></i> <span data-i18n="contact_tel"></span>
                            </a>
                            <a href="mailto:kontakt.amigo1@gmail.pl" class="btn btn-mail">
                                <i class="fas fa-envelope"></i> <span data-i18n="contact_email"></span>
                            </a>
                            <a href="https://maps.app.goo.gl/Bmb78SRDMfY3UxxF6" class="btn btn-maps" target="_blank">
                                <i class="fas fa-map-marker-alt"></i> <span data-i18n="contact_maps"></span>
                            </a>
                        </div>
                        
                        <div class="info-item">
                            <i class="fas fa-share-alt"></i>
                            <div>
                                <p><strong>Social Media:</strong></p>
                                <div class="social-links">
                                    <a href="https://facebook.com" target="_blank" class="fb"><i class="fab fa-facebook-f"></i> Facebook</a>
                                    <a href="https://instagram.com" target="_blank" class="ig"><i class="fab fa-instagram"></i> Instagram</a>
                                    <a href="https://wa.me/48790709410" target="_blank" class="wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                                    <a href="https://www.tiktok.com/@kraina.rozrywki.a" target="_blank" class="tt"><i class="fab fa-tiktok"></i> TikTok</a>
                                </div>
                            </div>
                        </div>
                    </div>
<!-- 
                    <form class="contact-form" onsubmit="event.preventDefault(); alert('Wiadomość wysłana!');">
                        <div class="form-group"><input type="text" placeholder="Imię / Name" required></div>
                        <div class="form-group"><input type="email" placeholder="E-mail" required></div>
                        <div class="form-group"><textarea rows="4" placeholder="Twoja wiadomość / Message" required></textarea></div>
                        <button type="submit" class="submit-btn" data-i18n="contact_btn">Wyślij</button>
                    </form> -->
                </div>
            </section>
        </main>

        <aside class="sidebar">
            <div class="sidebar-panel notice-board">
                <h3 data-i18n="sidebar_news">Informacje Bieżące</h3>
                <ul id="news-container"></ul>
            </div>

            <div class="sidebar-panel">
                <section id="oferta-kalendarz">
                    <h3 data-i18n="calendar_title"></h3>
                    
                    <div id="calendar-container"></div>
                </section>
            </div>
        </aside>
    </div>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-btn lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
        <button class="lightbox-btn lightbox-prev" onclick="changeImage(-1)"><i class="fas fa-chevron-left"></i></button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Powiększenie">
        <button class="lightbox-btn lightbox-next" onclick="changeImage(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div id="admin-save-bar" style="display: none;"></div>

    <button onclick="loginAsAdmin()" id="btn-admin-login"></button>

    <div id="admin-login-modal" class="custom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 10000;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; text-align: center;">
            <span onclick="closeAdminLoginModal()" style="position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa;">&times;</span>
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #333;">Logowanie Administratora</h3>
            
            <div style="margin-bottom: 15px;">
                <input type="email" id="admin-email-input" placeholder="Wpisz e-mail" style="width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
            </div>

            <div style="position: relative; margin-bottom: 20px;">
                <input type="password" id="admin-password-input" placeholder="Wpisz hasło" style="width: 100%; padding: 10px 40px 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                <i class="fas fa-eye" id="toggle-password-icon" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777;"></i>
            </div>
            
            <button onclick="submitAdminLogin()" style="width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;">Zaloguj się</button>
        </div>
    </div>

    <div id="reset-password-section" style="display: none; border: 1px solid #ccc; padding: 20px; margin-top: 20px;">
        <h3>Ustaw nowe hasło</h3>
        <form id="reset-password-form">
            <label for="new-password">Nowe hasło:</label>
            <input type="password" id="new-password" required minlength="6" placeholder="Min. 6 znaków">
            <button type="submit">Zapisz nowe hasło</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
