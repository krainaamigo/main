<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraina Rozrywki Amigo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; padding: 35px 25px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 420px; text-align: center;
        }
        .logo-area {
            width: 80px; height: 80px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px; box-shadow: 0 5px 15px rgba(254,207,239,0.5);
        }
        h1 { font-size: 24px; color: #2c3e50; margin-bottom: 8px; font-weight: 700; }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 30px; }
        
        /* Styl przycisków */
        .btn {
            display: flex; align-items: center; text-decoration: none; color: white; 
            padding: 16px 20px; margin-bottom: 14px; border-radius: 16px; font-weight: 600; font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .btn i { font-size: 20px; width: 30px; text-align: left; }
        .btn span { flex-grow: 1; text-align: center; margin-right: 30px; } /* Centrowanie tekstu mimo ikony */
        
        /* Specyficzne kolory dla sekcji kontaktowej */
        .btn-tel { background-color: #2980b9; }
        .btn-mail { background-color: #16a085; }
        .btn-maps { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area"><i class="fas fa-star"></i></div>
        <h1>Kraina Rozrywki Amigo</h1>
        <p class="subtitle">Skontaktuj się z nami lub odwiedź nasze social media</p>

        <a href="tel:+48790709410" class="btn btn-tel">
            <i class="fas fa-phone"></i> <span>Zadzwoń do nas</span>
        </a>
        <a href="mailto:kontakt.amigo1@gmail.pl" class="btn btn-mail">
            <i class="fas fa-envelope"></i> <span>Napisz e-mail</span>
        </a>
        <a href="https://maps.app.goo.gl/Bmb78SRDMfY3UxxF6" class="btn btn-maps" target="_blank">
            <i class="fas fa-map-marker-alt"></i> <span>Zobacz dojazd (Mapy)</span>
        </a>

        <div style="margin: 25px 0 15px; height: 1px; background: #eee;"></div>

                <a href="https://www.facebook.com/KrainaRozrywkiAMIGO" class="btn" style="background-color: #1877F2;" target="_blank">
            <i class="fab fa-facebook-f"></i> <span>Facebook</span>
        </a>
        <a href="https://www.instagram.com/kraina_rozrywki_amigo/" class="btn" style="background-color: #E1306C;" target="_blank">
            <i class="fab fa-instagram"></i> <span>Instagram</span>
        </a>
        <a href="https://wa.me/48790709410" class="btn" style="background-color: #25D366;" target="_blank">
            <i class="fab fa-whatsapp"></i> <span>WhatsApp</span>
        </a>
    </div>
</body>
</html>
